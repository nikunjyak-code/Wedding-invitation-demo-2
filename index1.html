<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
  <style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body, html {
    height: 100%;
    width: 100%;
    background: black;
    overflow: hidden;
  }

  .section-1 {
    height: 100vh;
    width: 100%;
    position: relative;
  }

  video {
    height: 100%;
    width: 100%;
    object-fit: cover;
  }

  /* Progress bar container */
  .progress-container {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 5px;
    background: rgba(255,255,255,0.2);
  }

  /* Actual progress */
  .progress-bar {
    height: 100%;
    width: 0%;
    background: #f2a1aa;
    transition: width 0.3s ease;
    box-shadow: 0 0 10px #f2a1aa;
}

/* Center Loader */
.loader {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

/* Circle design */
.circle {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  border: 4px solid rgba(255,255,255,0.2);
  border-top: 4px solid #f2a1aa;
  display: flex;
  align-items: center;
  justify-content: center;
  animation: spin 1s linear infinite;
  box-shadow: 0 0 20px rgba(242,161,170,0.5);
}

/* % text */
.circle span {
  position: absolute;
  font-size: 18px;
  color: white;
  font-family: Poppins, sans-serif;
}

/* Rotation */
@keyframes spin {
  100% {
    transform: rotate(360deg);
  }
}

</style>
    
</head>
<body>
    <div class="section-1">
      <video id="video" src="video1.mp4" muted autoplay playsinline></video>
      <div class="loader">
        <div class="circle">
          <span id="percent">0%</span>
        </div>
      </div>

      <div class="progress-container">
        <div class="progress-bar" id="progress">
        </div>
      </div>
    </div>

<script>
  const video = document.getElementById("video");
const progressBar = document.getElementById("progress");
const percentText = document.getElementById("percent");
const loader = document.querySelector(".loader");

// Fallback fake progress (smooth experience)
let fakeProgress = 0;
const fakeLoader = setInterval(() => {
  if (fakeProgress < 90) {
    fakeProgress += 1;
    percentText.innerText = fakeProgress + "%";
    progressBar.style.width = fakeProgress + "%";
  }
}, 100);

// Real progress (if available)
video.addEventListener("loadedmetadata", () => {
  video.addEventListener("progress", () => {
    try {
      if (video.buffered.length > 0 && video.duration > 0) {
        let bufferedEnd = video.buffered.end(video.buffered.length - 1);
        let percent = Math.min((bufferedEnd / video.duration) * 100, 100);

        fakeProgress = percent;
        percentText.innerText = Math.floor(percent) + "%";
        progressBar.style.width = percent + "%";
      }
    } catch (e) {}
  });
});

// When ready
video.addEventListener("playing", () => {
  clearInterval(fakeLoader);

  percentText.innerText = "100%";
  progressBar.style.width = "100%";

  // Instantly hide loader
  loader.style.display = "none";
  document.querySelector(".progress-container").style.display = "none";
});

// Tap to play
document.body.addEventListener("click", () => {
  video.play();
});

// Redirect after video ends
video.addEventListener("ended", () => {
  window.location.href = "index2.html";
});

// Fallback redirect
setTimeout(() => {
  if (video.readyState < 3) {
    window.location.href = "index2.html";
  }
}, 10000);

</script> 
    
</body>
</html>
