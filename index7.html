<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Poppins&family=Playfair+Display&display=swap" rel="stylesheet">

  <style>
    * {
      -webkit-tap-highlight-color: transparent;
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      color: white;
    }

    body {
      background: black;
      animation: fadeIn 1s ease;
    }

    .section-7 {
      min-height: 650px;
      width: 290px;
      background-image: url("h2.jpeg");
      margin: 30px auto;
      border-radius: 135px 135px 0 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 20px 0 0;
      box-shadow: 0 20px 50px rgba(255,215,0,0.2);
    }

    .heading {
      font-family: 'Playfair Display', serif;
      font-size: 34px;
      margin-bottom: 10px;
    }

    .line1 {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      margin: 40px 0 20px;
    }

    .line2 {
      font-family: 'allura', cursive;
      font-size: 20px;
      line-height: 1.6;
      margin-bottom: 20px;
      padding: 0 15px;
    }

    .question {
      font-family: 'Poppins', sans-serif;
      font-size: 17px;
      margin-bottom: 10px;
    }

    .subtext {
      font-size: 11px;
      opacity: 0.7;
      margin-bottom: 25px;
    }

    .btnGroup {
      display: flex;
      gap: 15px;
      width: 100%;
      padding: 0 10px;
    }

    .yesBtn, .noBtn {
      flex: 1;
      -webkit-tap-highlight-color: transparent;
      outline: none;
      padding: 12px 0;
      border: 1.5px solid black;
      border-radius: 70px;
      background: #E8DCCB;
      color: black;
      cursor: pointer;
      font-family: 'Poppins', sans-serif;
      transition: 0.3s;
      position: relative;
      overflow: hidden;
    }

    .yesBtn:hover {
      background: #D6C6B2;
      color: black;
    }

    .noBtn:hover {
      background: #D6C6B2;
      color: black;
    }

    .footerText {
      font-family: 'Playfair Display', serif;
      font-size: 26px;
      margin-top: 25px;
      opacity: 0.8;
      padding: 0 15px;
    }

    /* Bottom button */
    .Btn {
      width: 100%;
      display: flex;
      justify-content: flex-start;
      margin-top: auto;
    }

    .preBtn {
      padding: 10px 50px;
      -webkit-tap-highlight-color: transparent;
      outline: none;
      border: 1.5px solid black;
      background: #E8DCCB;
      color: black;
      font-family: 'Poppins', sans-serif;
      cursor: pointer;
      transition: 0.3s;
    }

    .preBtn:hover {
      background: #D6C6B2;
      color: black;
      transform: scale(1.05);
    }

    @keyframes fadeIn {
      from {opacity: 0;}
      to {opacity: 1;}
    }
    
    /* Background for big screens */
.bg {
  position: absolute;
  width: 100%;
  height: 100vh;
  max-height: 768px;
  margin-top: 0px;
  background-image: url("bg.jpg");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  z-index: -10;
}

/* Mobile container */
.phone-container {
  max-width: 420px;
  top: 0px;
  margin: 0 auto;
  height: 100vh;
  max-height: 768px;
  /*background: linear-gradient(135deg, #8b0000, #ff3b3b);*/
  padding-top: 8px;
  background-color: #FAF0E6;
  box-shadow: 0 0 40px rgba(0,0,0,0.5);
}
    
  </style>
</head>

<body>

<!-- Background Layer -->
  <div class="bg"></div>

<!-- Main Mobile Container -->
<div class="phone-container">

  <div class="section-7">

    <div class="heading">RSVP</div>

    <p class="line1">With heartfelt joy,</p>

    <p class="line2">
    We invite you to join us<br>
    in celebrating this beautiful union<br>
    and be a part of our special day.
    </p>

    <p class="question">
    Will you grace us with your presence?
    </p>

    <p class="subtext">
    Kindly let us know your response
    </p>

    <div class="btnGroup">
      <button class="yesBtn" onclick="goYes()">Will be there</button>
      <button class="noBtn" onclick="goNo()">With blessings</button>
    </div>

    <p class="footerText">
    Your presence will make our celebration truly memorable
    </p>

    <div class="Btn">
      <a href="index6.html"><button class="preBtn">Previous</button></a>
    </div>
  </div>
</div>

<script>
function goYes() {
  window.location.href = "rsvp-form.html";
}

function goNo() {
  window.location.href = "index8.html";
}

</script>

</body>
</html>
